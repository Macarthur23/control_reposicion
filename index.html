<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMART - LPN Cloud Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 10px; }
        .header { background: #ff5000; padding: 15px; font-weight: bold; border-radius: 0 0 15px 15px; margin-bottom: 10px; font-size: 22px; }
        #seccion-admin, #seccion-operario { display: none; margin-top: 10px; }
        .card { background: #222; padding: 25px; border-radius: 15px; border: 1px solid #444; margin: 10px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; margin-top: 10px; }
        .producto { padding: 18px; margin: 12px 0; border-radius: 12px; text-align: left; position: relative; }
        .quiebre { background: #d32f2f; border-left: 10px solid #ffeb3b; }
        .subir { background: #2e7d32; border-left: 10px solid #a5d6a7; }
        .potencia { background: #1565c0; border-left: 10px solid #90caf9; }
        .status-txt { font-size: 26px; font-weight: bold; display: block; }
        .desc-txt { font-size: 16px; margin: 5px 0; }
        .sku-txt { font-size: 13px; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 4px; }
        
        /* MEJORA: Estilo para la cantidad en HOME */
        .home-badge { 
            position: absolute; top: 15px; right: 15px; 
            background: white; color: black; 
            padding: 5px 10px; border-radius: 8px; 
            font-weight: bold; text-align: center; 
        }
        .home-label { display: block; font-size: 9px; text-transform: uppercase; color: #666; }

        .input-group { margin-bottom: 15px; display: flex; gap: 5px; justify-content: center; }
        #inputManual { width: 65%; padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
        .btn { padding: 12px 20px; background: #ff5000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-danger { background: #d32f2f; margin-top: 15px; font-size: 12px; padding: 8px 15px; }
    </style>
</head>
<body>

    <div class="header" id="main-title">PROMART LPN</div>

    <div id="seccion-admin">
        <div class="card">
            <h3>PANEL DE CONTROL</h3>
            <p style="font-size: 13px; color: #aaa;">Al subir un archivo, se borrará lo anterior automáticamente.</p>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
            <div id="progreso" style="color: #ff5000; margin-top:10px; font-weight: bold;"></div>
            
            <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
            <button class="btn btn-danger" id="btnVaciar">🗑️ VACIAR TODA LA BASE DE DATOS</button>
        </div>
    </div>

    <div id="seccion-operario">
        <div class="input-group">
            <input type="text" id="inputManual" placeholder="LPN Manual...">
            <button class="btn" id="btnManual">BUSCAR</button>
        </div>
        <div id="reader"></div>
        <div id="lista-productos"></div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // 1. CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyD9Qe1lTPT0X38St8uGAQvbDHxKe_kLutU",
            authDomain: "promart-lpn.firebaseapp.com",
            projectId: "promart-lpn",
            storageBucket: "promart-lpn.firebasestorage.app",
            messagingSenderId: "1050885503301",
            appId: "1:1050885503301:web:8ebb61651df1be7a09662c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let ultimoCodigoLeido = "";
        let tiempoUltimaLectura = 0;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('admin')) {
            document.getElementById('seccion-admin').style.display = 'block';
            document.getElementById('main-title').innerText = "PROMART ADMIN";
        } else {
            document.getElementById('seccion-operario').style.display = 'block';
            iniciarEscanner();
        }

        async function limpiarBaseDeDatos() {
            const progresoDiv = document.getElementById('progreso');
            progresoDiv.innerHTML = "<span style='color:yellow'>⏳ Limpiando sistema...</span>";
            try {
                const snapshot = await db.collection("cruce").get();
                const totalDocs = snapshot.size;
                if(totalDocs === 0) return true;

                const chunks = [];
                const docs = snapshot.docs;
                for (let i = 0; i < docs.length; i += 500) {
                    chunks.push(docs.slice(i, i + 500));
                }

                for (const chunk of chunks) {
                    const batch = db.batch();
                    chunk.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                }
                return true;
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        document.getElementById('btnVaciar').addEventListener('click', async () => {
            if(confirm("¿Estás segura de que quieres borrar TODOS los datos? El equipo no podrá escanear nada hasta que subas un nuevo Excel.")) {
                const exito = await limpiarBaseDeDatos();
                if(exito) {
                    document.getElementById('progreso').innerHTML = "<span style='color:#4CAF50'>✅ SISTEMA VACÍO</span>";
                }
            }
        });

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            await limpiarBaseDeDatos();

            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const total = rows.length;
            const chunk = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));
            const grupos = chunk(rows, 500);

            let procesados = 0;
            for (const grupo of grupos) {
                const batch = db.batch();
                grupo.forEach((r) => {
                    const docId = `item_${procesados}`;
                    const docRef = db.collection("cruce").doc(docId);
                    batch.set(docRef, {
                        lpn: String(r['LPN'] || '').trim().toUpperCase(),
                        sku: String(r['SKU'] || ''),
                        desc: String(r['DESCRIPCION'] || ''),
                        obs: String(r['OBS - QV'] || '').trim().toUpperCase(),
                        // MEJORA: Guardar columna HOME
                        home: String(r['HOME'] || '0')
                    });
                    procesados++;
                });
                await batch.commit();
                document.getElementById('progreso').innerText = `Subiendo: ${Math.round((procesados / total) * 100)}%`;
            }
            document.getElementById('progreso').innerHTML = "<span style='color:#4CAF50'>✅ ACTUALIZADO</span>";
        });

        function iniciarEscanner() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                const ahora = Date.now();
                const textoLimpio = decodedText.trim().toUpperCase();
                if (textoLimpio !== ultimoCodigoLeido || (ahora - tiempoUltimaLectura) > 3000) {
                    ultimoCodigoLeido = textoLimpio;
                    tiempoUltimaLectura = ahora;
                    document.getElementById('beep').play();
                    buscarEnNube(textoLimpio);
                }
            });
        }

        async function buscarEnNube(lpnValue) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = "";
            const snapshot = await db.collection("cruce").where("lpn", "==", lpnValue).get();
            if (snapshot.empty) {
                contenedor.innerHTML = `<h2 style="color:#ff5000">LPN: ${lpnValue}</h2><h3 style="color:yellow">⚠️ NO ENCONTRADO</h3>`;
                return;
            }
            let html = `<h2 style="color:#ff5000">LPN: ${lpnValue}</h2>`;
            snapshot.forEach(doc => {
                const p = doc.data();
                const claseCss = p.obs.includes('QUIEBRE') ? 'quiebre' : p.obs.includes('SUBIR') ? 'subir' : 'potencia';
                
                // MEJORA: Mostrar badge de HOME en la tarjeta
                html += `<div class="producto ${claseCss}">
                            <div class="home-badge">
                                <span class="home-label">HOME</span>
                                ${p.home || '0'}
                            </div>
                            <span class="status-txt">${p.obs}</span>
                            <div class="desc-txt">${p.desc}</div>
                            <div class="sku-txt">SKU: ${p.sku}</div>
                         </div>`;
            });
            contenedor.innerHTML = html;
        }

        document.getElementById('btnManual').addEventListener('click', () => {
            const val = document.getElementById('inputManual').value.toUpperCase();
            if (val) { buscarEnNube(val); document.getElementById('inputManual').value = ""; }
        });
    </script>
</body>
</html>
