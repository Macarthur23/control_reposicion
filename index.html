<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMART - LPN Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 10px; }
        .header { background: #ff5000; padding: 15px; font-weight: bold; border-radius: 0 0 15px 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .status-dot { height: 10px; width: 10px; background-color: #4CAF50; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        /* Contenedores */
        #seccion-admin, #seccion-operario { display: none; margin-top: 10px; }
        .card { background: #222; padding: 20px; border-radius: 15px; border: 1px solid #444; margin: 10px; }
        
        /* Cámara y Resultados */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .producto { padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; }
        .quiebre { background: #d32f2f; border-left: 10px solid #ffeb3b; }
        .subir { background: #2e7d32; border-left: 10px solid #a5d6a7; }
        .potencia { background: #1565c0; border-left: 10px solid #90caf9; }
        
        .status-txt { font-size: 24px; font-weight: bold; display: block; }
        .sku-txt { font-size: 13px; background: rgba(0,0,0,0.4); padding: 3px; border-radius: 4px; }
        
        /* Botones y Inputs */
        .btn-upload { background: #ff5000; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        #inputManual { width: 70%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header" id="titulo-pagina">PROMART MONITOR</div>
    <div style="font-size: 11px; margin-bottom: 10px;"><span class="status-dot"></span>NUBE SINCRONIZADA</div>

    <div id="seccion-admin">
        <div class="card">
            <h3>PANEL DE CARGA (ADMIN)</h3>
            <p>Sube el Excel para actualizar a todo el equipo.</p>
            <input type="file" id="fileInput" accept=".xlsx, .xls">
            <div id="progreso" style="margin-top: 10px; color: #ff5000;"></div>
        </div>
    </div>

    <div id="seccion-operario">
        <input type="text" id="inputManual" placeholder="LPN Manual...">
        <div id="reader"></div>
        <div id="lista-productos"></div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // 1. REEMPLAZA CON TUS DATOS DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD9Qe1lTPT0X38St8uGAQvbDHxKe_kLutU",
            authDomain: "promart-lpn.firebaseapp.com",
            projectId: "promart-lpn",
            storageBucket: "promart-lpn.firebasestorage.app",
            messagingSenderId: "1050885503301",
            appId: "1:1050885503301:web:8ebb61651df1be7a09662c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Lógica de Navegación
        const params = new URLSearchParams(window.location.search);
        if (params.has('admin')) {
            document.getElementById('seccion-admin').style.display = 'block';
            document.getElementById('titulo-pagina').innerText = "PROMART ADMIN";
        } else {
            document.getElementById('seccion-operario').style.display = 'block';
            iniciarCamara();
        }

        // 3. Admin: Cargar Excel a Firestore (VERSIÓN ULTRA RÁPIDA)
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            const total = rows.length;
            const progresoDiv = document.getElementById('progreso');
            progresoDiv.innerText = "Iniciando subida masiva...";

            // Función para dividir las filas en grupos de 500 (límite de Firebase)
            const chunk = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));
            const grupos = chunk(rows, 500);

            try {
                let procesados = 0;
                for (const grupo de grupos) {
                    const batch = db.batch(); // Creamos un lote
                    
                    grupo.forEach((r) => {
                        // Usamos una combinación de LPN y SKU como ID para evitar duplicados exactos
                        const idUnico = `${r['LPN']}_${r['SKU']}_${procesados}`;
                        const docRef = db.collection("cruce").doc(idUnico);
                        
                        batch.set(docRef, {
                            lpn: String(r['LPN'] || '').trim().toUpperCase(),
                            sku: String(r['SKU'] || ''),
                            desc: String(r['DESCRIPCION'] || ''),
                            obs: String(r['OBS - QV'] || '').trim().toUpperCase(),
                            fecha: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        procesados++;
                    });

                    await batch.commit(); // Se suben 500 de golpe
                    progresoDiv.innerText = `Progreso: ${Math.round((procesados / total) * 100)}%`;
                }
                
                progresoDiv.innerHTML = "<b style='color:#4CAF50'>✅ ¡SUBIDA COMPLETADA CON ÉXITO!</b>";
                alert("¡Base de datos actualizada!");
            } catch (error) {
                console.error("Error al subir:", error);
                progresoDiv.innerText = "❌ Error en la subida.";
            }
        });

        // 4. Operario: Consultar y Escanear
        function iniciarCamara() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: {width: 250, height: 150} }, 
            (text) => {
                document.getElementById('beep').play();
                buscarLPN(text.toUpperCase());
            });
        }

        async function buscarLPN(lpn) {
            const snap = await db.collection("cruce").where("lpn", "==", lpn).get();
            const box = document.getElementById('lista-productos');
            box.innerHTML = `<h2 style="color:#ff5000">LPN: ${lpn}</h2>`;
            
            if (snap.empty) {
                box.innerHTML += '<h3 style="color:yellow">⚠️ NO ENCONTRADO EN LA NUBE</h3>';
                return;
            }

            snap.forEach(doc => {
                const p = doc.data();
                const clase = p.obs.includes('QUIEBRE') ? 'quiebre' : p.obs.includes('SUBIR') ? 'subir' : 'potencia';
                box.innerHTML += `
                    <div class="producto ${clase}">
                        <span class="status-txt">${p.obs}</span>
                        <div style="font-weight:bold">${p.desc}</div>
                        <div class="sku-txt">SKU: ${p.sku}</div>
                    </div>`;
            });
        }

        // Búsqueda Manual
        document.getElementById('inputManual').addEventListener('change', (e) => {
            buscarLPN(e.target.value.toUpperCase());
            e.target.value = '';
        });
    </script>
</body>
</html>
