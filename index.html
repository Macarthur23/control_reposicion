<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMART - Lector LPN</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; padding: 10px; }
        .header { background-color: #ff5000; padding: 15px; font-weight: bold; font-size: 20px; border-radius: 0 0 15px 15px; margin-bottom: 15px; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 10px; background: #333; }
        
        .producto { padding: 15px; margin: 10px 0; border-radius: 12px; text-align: left; }
        .quiebre { background-color: #d32f2f; border-left: 10px solid #ffeb3b; }
        .subir { background-color: #2e7d32; border-left: 10px solid #a5d6a7; }
        .potencia { background-color: #1565c0; border-left: 10px solid #90caf9; }
        
        .status { font-size: 24px; font-weight: bold; display: block; margin-bottom: 5px; }
        .desc { font-size: 16px; font-weight: bold; }
        .sku { font-size: 14px; opacity: 0.8; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; }
        #resultado-lpn { color: #ff5000; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">PROMART - MONITOR LPN</div>

    <div id="reader"></div>
    <div id="resultado-lpn">ESPERANDO ESCANEO...</div>
    <div id="lista-productos"></div>

    <script>
        // DATOS DE TU EXCEL (Ya inyectados)
        const inventario = [
            {"lpn": "TLPN4040312848", "sku": "152393", "desc": "FOCO UFO ORANGE E27 34WLUZ FRIA", "obs": "SUBIR"},
            {"lpn": "TLPN4040312849", "sku": "152393", "desc": "FOCO UFO ORANGE E27 34WLUZ FRIA", "obs": "SUBIR"},
            {"lpn": "TLPN4040318092", "sku": "132463", "desc": "5pz-XLIG-FOCO LED PACK X5 E27 15W LUZ BLANCA ORANGE", "obs": "SUBIR"},
            {"lpn": "TLPN4040318092", "sku": "126267", "desc": "1pz-XLIG-PACK X 3 BULBO LED E27 15W LF ORANGE", "obs": "SUBIR"},
            {"lpn": "TLPN4040318092", "sku": "132464", "desc": "5pz-XLIG-FOCO LED PACK X5 E27 7W LUZ BLANCA ORANGE", "obs": "SUBIR"},
            {"lpn": "B5617613840", "sku": "131545", "desc": "XPE-LIMPIAVIDRIOS SAPOLIO 5 LT", "obs": "QUIEBRE"},
            {"lpn": "B5617683366", "sku": "137756", "desc": "XSS-SIERRA CIRCULAR 1/4 DCS570B", "obs": "POTENCIA"}
            // Aquí puedes seguir pegando más filas del Excel...
        ];

        function onScanSuccess(decodedText) {
            // Audio de confirmación
            const audio = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');
            audio.play();

            document.getElementById('resultado-lpn').innerText = "LPN ESCANEADO: " + decodedText;
            
            // Buscar productos
            const encontrados = inventario.filter(i => i.lpn.trim().toUpperCase() === decodedText.trim().toUpperCase());
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';

            if (encontrados.length > 0) {
                encontrados.forEach(p => {
                    const div = document.createElement('div');
                    div.className = `producto ${p.obs.toLowerCase()}`;
                    div.innerHTML = `
                        <span class="status">${p.obs}</span>
                        <div class="desc">${p.desc}</div>
                        <div class="sku">SKU: ${p.sku}</div>
                    `;
                    contenedor.appendChild(div);
                });
            } else {
                contenedor.innerHTML = '<h2 style="color:yellow">⚠️ NO ENCONTRADO</h2>';
            }
        }

        // Configurar el escáner
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };

        // Iniciar cámara trasera automáticamente
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

    </script>
</body>
</html>
